<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TechBlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <span class="logo-icon">T</span>
        TechBlog
      </a>
      <div>
        <a href="/register.html" class="btn btn-primary btn-sm">注册账号</a>
      </div>
    </div>
  </nav>

  <!-- 登录表单 -->
  <div class="auth-page">
    <div class="auth-card">
      <h2>&#128075; 欢迎回来</h2>
      <p class="auth-subtitle">登录你的账号继续使用</p>

      <div id="loginAlert" class="hidden"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">邮箱地址</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="your@email.com" required autocomplete="email">
          <div class="form-error hidden" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">密码</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="输入密码" required autocomplete="current-password">
          <div class="form-error hidden" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          登录
        </button>
      </form>

      <div class="auth-footer">
        还没有账号？ <a href="/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // 如果已登录，跳转到首页
    if (Auth.isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // 前端验证
      let valid = true;
      if (!email || !isValidEmail(email)) {
        showFieldError('email', '请输入有效的邮箱地址');
        valid = false;
      } else {
        clearFieldError('email');
      }

      if (!password) {
        showFieldError('password', '请输入密码');
        valid = false;
      } else {
        clearFieldError('password');
      }

      if (!valid) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="width:20px;height:20px;"></span> 登录中...';

      try {
        const data = await API.login({ email, password });
        Auth.setToken(data.token, data.user);
        showToast('登录成功！正在跳转...', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);
      } catch (error) {
        showToast(error.message || '登录失败', 'error');
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
